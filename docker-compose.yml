version: "3.8"

services:
  icecast:
    image: moul/icecast
    container_name: icecast
    ports:
      - "8123:8000" # 0.0.0.0:8123/radio
    restart: unless-stopped

  liquidsoap:
    image: phasecorex/liquidsoap
    container_name: liquidsoap
    ports:
      - "1234:1234" # telnet 127.0.0.1 1234
    depends_on:
      - icecast
    volumes:
      - ./radio.liq:/data/radio.liq
      - ./music:/music
    command: /data/radio.liq
    restart: unless-stopped

